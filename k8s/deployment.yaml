apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbb-chat-agent
  namespace: qid
  labels:
    app: openbb-chat-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbb-chat-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openbb-chat-agent
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: init-claude-home
          image: busybox:1.35
          command:
            - sh
            - -c
            - mkdir -p /data/.claude-home/.claude && chmod 700 /data/.claude-home/.claude
          volumeMounts:
            - name: claude-home
              mountPath: /data/.claude-home
      containers:
        - name: openbb-chat-agent
          image: ghcr.io/blevinson/openbb-chat-agent:v0.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CLAUDE_HOME
              value: /data/.claude-home
            - name: CLAUDE_MODEL
              value: "claude-sonnet-4-6"
            - name: GRAPHITI_MCP_URL
              value: "http://graphiti-mcp.qid.svc.cluster.local:8000/mcp"
            - name: TRADEFARM_URL
              value: "http://tradefarm-live-backend.tradefarm-live.svc.cluster.local:8000"
            - name: API_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbb-chat-agent-auth
                  key: API_BEARER_TOKEN
            - name: OPENAI_API_KEY
              value: "none"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: claude-home
              mountPath: /data/.claude-home
      volumes:
        - name: claude-home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openbb-chat-agent
  namespace: qid
  labels:
    app: openbb-chat-agent
spec:
  selector:
    app: openbb-chat-agent
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
# Secret — create before deploying:
#   kubectl -n qid create secret generic openbb-chat-agent-auth \
#     --from-literal=API_BEARER_TOKEN=<choose-a-strong-token>
# Register the same token in pro.openbb.co Workspace → Custom Backends.
