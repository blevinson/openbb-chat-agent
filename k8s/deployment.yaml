apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbb-chat-agent
  namespace: qid
  labels:
    app: openbb-chat-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbb-chat-agent
  template:
    metadata:
      labels:
        app: openbb-chat-agent
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: openbb-chat-agent
          image: ghcr.io/blevinson/openbb-chat-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: API_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbb-chat-agent-secret
                  key: api_bearer_token
            # Azure Anthropic proxy — same as qid-intelligence; sk-proxy is the sentinel key
            - name: ANTHROPIC_API_KEY
              value: "sk-proxy"
            - name: ANTHROPIC_BASE_URL
              value: "http://azure-anthropic-proxy.cloudtorch.svc.cluster.local:4000/v1"
            - name: LLM_MODEL
              value: "claude-sonnet-4-6"
            - name: GRAPHITI_BASE_URL
              value: "http://graphiti-mcp.qid.svc.cluster.local:8000"
            - name: GRAPHITI_GROUP_ID
              value: "qid_intelligence"
            - name: TRADEFARM_URL
              value: "http://tradefarm-backend.tradefarm.svc.cluster.local:8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: openbb-chat-agent
  namespace: qid
  labels:
    app: openbb-chat-agent
spec:
  selector:
    app: openbb-chat-agent
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
# Secret template — create manually before deploying:
#   kubectl -n qid create secret generic openbb-chat-agent-secret \
#     --from-literal=api_bearer_token=<choose-a-token>
# Then register the same token in pro.openbb.co Workspace backend settings.
